name: Backend CI/CD

on:
  pull_request:
    branches:
      - master
    paths:
      - ".github/workflows/deploy-backend.yml"
      - ".dockerignore"
      - "Dockerfile"
      - "docker-compose.app.yml"
      - "docker-compose.deploy.yml"
      - "docker-compose.infra.yml"
      - "gateway/**"
      - "go.mod"
      - "go.sum"
      - "cmd/**"
      - "configs/**"
      - "internal/**"
      - "ai-image-service/**"
  push:
    branches:
      - master
    paths:
      - ".github/workflows/deploy-backend.yml"
      - ".dockerignore"
      - "Dockerfile"
      - "docker-compose.app.yml"
      - "docker-compose.deploy.yml"
      - "docker-compose.infra.yml"
      - "gateway/**"
      - "go.mod"
      - "go.sum"
      - "cmd/**"
      - "configs/**"
      - "internal/**"
      - "ai-image-service/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify backend
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download Go modules
        run: go mod download

      - name: Check Go formatting
        shell: bash
        run: |
          set -euo pipefail
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::Go files are not formatted. Run gofmt -w ."
            printf '%s\n' "$unformatted"
            exit 1
          fi

      - name: Vet Go packages
        run: go vet ./...

      - name: Test Go packages
        run: go test -race -cover ./...

      - name: Build Go binaries
        run: |
          mkdir -p bin
          go build -ldflags="-s -w" -o bin/api ./cmd/api
          go build -ldflags="-s -w" -o bin/worker ./cmd/worker

      - name: Validate Docker Compose files
        run: |
          docker compose -f docker-compose.infra.yml config --quiet
          docker compose -f docker-compose.app.yml config --quiet
          docker compose -f docker-compose.infra.yml -f docker-compose.app.yml config --quiet
          API_IMAGE=wechat-mall-api:test AI_IMAGE=wechat-mall-ai-image:test docker compose -f docker-compose.deploy.yml config --quiet
          API_IMAGE=wechat-mall-api:test AI_IMAGE=wechat-mall-ai-image:test docker compose -f docker-compose.infra.yml -f docker-compose.deploy.yml config --quiet

      - name: Build API Docker image
        run: docker build -t wechat-mall-api:${{ github.sha }} -f Dockerfile .

      - name: Build AI image service Docker image
        run: docker build -t wechat-mall-ai-image:${{ github.sha }} -f ai-image-service/Dockerfile ai-image-service

  publish:
    name: Publish SWR images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    needs: verify
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/master') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SWR image metadata
        id: images
        shell: bash
        env:
          HUAWEI_SWR_REGISTRY: ${{ secrets['HUAWEI_SWR_REGISTRY'] }}
          HUAWEI_SWR_NAMESPACE: ${{ secrets['HUAWEI_SWR_NAMESPACE'] }}
          HUAWEI_SWR_API_REPOSITORY: ${{ secrets['HUAWEI_SWR_API_REPOSITORY'] }}
          HUAWEI_SWR_AI_IMAGE_REPOSITORY: ${{ secrets['HUAWEI_SWR_AI_IMAGE_REPOSITORY'] }}
          HUAWEI_SWR_GATEWAY_REPOSITORY: ${{ secrets['HUAWEI_SWR_GATEWAY_REPOSITORY'] }}
          HUAWEI_SWR_REDIS_REPOSITORY: ${{ secrets['HUAWEI_SWR_REDIS_REPOSITORY'] }}
        run: |
          set -euo pipefail
          : "${HUAWEI_SWR_REGISTRY:?Set GitHub secret HUAWEI_SWR_REGISTRY}"
          : "${HUAWEI_SWR_NAMESPACE:?Set GitHub secret HUAWEI_SWR_NAMESPACE}"

          registry="${HUAWEI_SWR_REGISTRY%/}"
          api_repository="${HUAWEI_SWR_API_REPOSITORY:-wechat-mall-api}"
          ai_repository="${HUAWEI_SWR_AI_IMAGE_REPOSITORY:-wechat-mall-ai-image}"
          gateway_repository="${HUAWEI_SWR_GATEWAY_REPOSITORY:-wechat-mall-gateway}"
          redis_repository="${HUAWEI_SWR_REDIS_REPOSITORY:-wechat-mall-redis}"

          api_image="${registry}/${HUAWEI_SWR_NAMESPACE}/${api_repository}:${GITHUB_SHA}"
          ai_image="${registry}/${HUAWEI_SWR_NAMESPACE}/${ai_repository}:${GITHUB_SHA}"
          api_latest="${registry}/${HUAWEI_SWR_NAMESPACE}/${api_repository}:latest"
          ai_latest="${registry}/${HUAWEI_SWR_NAMESPACE}/${ai_repository}:latest"
          gateway_image="${registry}/${HUAWEI_SWR_NAMESPACE}/${gateway_repository}:1.27-alpine"
          redis_image="${registry}/${HUAWEI_SWR_NAMESPACE}/${redis_repository}:7-alpine"

          {
            echo "api_image=$api_image"
            echo "ai_image=$ai_image"
            echo "api_latest=$api_latest"
            echo "ai_latest=$ai_latest"
            echo "gateway_image=$gateway_image"
            echo "redis_image=$redis_image"
          } >> "$GITHUB_OUTPUT"

      - name: Login to Huawei SWR
        shell: bash
        env:
          HUAWEI_SWR_REGISTRY: ${{ secrets['HUAWEI_SWR_REGISTRY'] }}
          HUAWEI_SWR_USERNAME: ${{ secrets['HUAWEI_SWR_USERNAME'] }}
          HUAWEI_SWR_PASSWORD: ${{ secrets['HUAWEI_SWR_PASSWORD'] }}
        run: |
          set -euo pipefail
          : "${HUAWEI_SWR_REGISTRY:?Set GitHub secret HUAWEI_SWR_REGISTRY}"
          : "${HUAWEI_SWR_USERNAME:?Set GitHub secret HUAWEI_SWR_USERNAME}"
          : "${HUAWEI_SWR_PASSWORD:?Set GitHub secret HUAWEI_SWR_PASSWORD}"
          printf '%s\n' "$HUAWEI_SWR_PASSWORD" | docker login "$HUAWEI_SWR_REGISTRY" -u "$HUAWEI_SWR_USERNAME" --password-stdin

      - name: Build and push API image
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            -t "${{ steps.images.outputs.api_image }}" \
            -t "${{ steps.images.outputs.api_latest }}" \
            -f Dockerfile .
          docker push "${{ steps.images.outputs.api_image }}"
          docker push "${{ steps.images.outputs.api_latest }}"

      - name: Build and push AI image service image
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            -t "${{ steps.images.outputs.ai_image }}" \
            -t "${{ steps.images.outputs.ai_latest }}" \
            -f ai-image-service/Dockerfile ai-image-service
          docker push "${{ steps.images.outputs.ai_image }}"
          docker push "${{ steps.images.outputs.ai_latest }}"

      - name: Mirror runtime base images to Huawei SWR
        shell: bash
        run: |
          set -euo pipefail
          docker pull nginx:1.27-alpine
          docker tag nginx:1.27-alpine "${{ steps.images.outputs.gateway_image }}"
          docker push "${{ steps.images.outputs.gateway_image }}"

          docker pull redis:7-alpine
          docker tag redis:7-alpine "${{ steps.images.outputs.redis_image }}"
          docker push "${{ steps.images.outputs.redis_image }}"

  deploy:
    name: Deploy Docker services
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    needs:
      - verify
      - publish
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/master') }}
    env:
      DEPLOY_HOST: ${{ secrets['DEPLOY_HOST'] }}
      DEPLOY_USER: ${{ secrets['DEPLOY_USER'] }}
      DEPLOY_SSH_KEY: ${{ secrets['DEPLOY_SSH_KEY'] }}
      DEPLOY_PORT: ${{ secrets['DEPLOY_PORT'] }}
      DEPLOY_PATH: ${{ secrets['DEPLOY_PATH'] }}
      HUAWEI_SWR_REGISTRY: ${{ secrets['HUAWEI_SWR_REGISTRY'] }}
      HUAWEI_SWR_NAMESPACE: ${{ secrets['HUAWEI_SWR_NAMESPACE'] }}
      HUAWEI_SWR_API_REPOSITORY: ${{ secrets['HUAWEI_SWR_API_REPOSITORY'] }}
      HUAWEI_SWR_AI_IMAGE_REPOSITORY: ${{ secrets['HUAWEI_SWR_AI_IMAGE_REPOSITORY'] }}
      HUAWEI_SWR_GATEWAY_REPOSITORY: ${{ secrets['HUAWEI_SWR_GATEWAY_REPOSITORY'] }}
      HUAWEI_SWR_REDIS_REPOSITORY: ${{ secrets['HUAWEI_SWR_REDIS_REPOSITORY'] }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deployment image metadata
        shell: bash
        run: |
          set -euo pipefail
          : "${HUAWEI_SWR_REGISTRY:?Set GitHub secret HUAWEI_SWR_REGISTRY}"
          : "${HUAWEI_SWR_NAMESPACE:?Set GitHub secret HUAWEI_SWR_NAMESPACE}"

          registry="${HUAWEI_SWR_REGISTRY%/}"
          api_repository="${HUAWEI_SWR_API_REPOSITORY:-wechat-mall-api}"
          ai_repository="${HUAWEI_SWR_AI_IMAGE_REPOSITORY:-wechat-mall-ai-image}"
          gateway_repository="${HUAWEI_SWR_GATEWAY_REPOSITORY:-wechat-mall-gateway}"
          redis_repository="${HUAWEI_SWR_REDIS_REPOSITORY:-wechat-mall-redis}"

          {
            echo "API_IMAGE=${registry}/${HUAWEI_SWR_NAMESPACE}/${api_repository}:${GITHUB_SHA}"
            echo "AI_IMAGE=${registry}/${HUAWEI_SWR_NAMESPACE}/${ai_repository}:${GITHUB_SHA}"
            echo "GATEWAY_IMAGE=${registry}/${HUAWEI_SWR_NAMESPACE}/${gateway_repository}:1.27-alpine"
            echo "REDIS_IMAGE=${registry}/${HUAWEI_SWR_NAMESPACE}/${redis_repository}:7-alpine"
          } >> "$GITHUB_ENV"

      - name: Prepare SSH
        shell: bash
        run: |
          set -euo pipefail
          : "${DEPLOY_HOST:?Set GitHub secret DEPLOY_HOST}"
          : "${DEPLOY_USER:?Set GitHub secret DEPLOY_USER}"
          : "${DEPLOY_SSH_KEY:?Set GitHub secret DEPLOY_SSH_KEY}"

          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          DEPLOY_PATH="${DEPLOY_PATH:-/srv/go-shoppings}"

          {
            echo "DEPLOY_PORT=$DEPLOY_PORT"
            echo "DEPLOY_PATH=$DEPLOY_PATH"
          } >> "$GITHUB_ENV"

          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Sync runtime deployment files
        shell: bash
        run: |
          set -euo pipefail
          command -v tar >/dev/null

          bundle_dir="$(mktemp -d)"
          trap 'rm -rf "$bundle_dir"' EXIT
          mkdir -p "$bundle_dir/gateway"
          cp docker-compose.infra.yml "$bundle_dir/docker-compose.infra.yml"
          cp docker-compose.deploy.yml "$bundle_dir/docker-compose.deploy.yml"
          cp gateway/nginx.conf "$bundle_dir/gateway/nginx.conf"

          remote_check_cmd='command -v docker >/dev/null && docker compose version >/dev/null && command -v tar >/dev/null'
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "$remote_check_cmd"

          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH=$(printf '%q' "$DEPLOY_PATH") bash -s" <<'REMOTE'
          set -euo pipefail
          mkdir -p "$DEPLOY_PATH"
          find "$DEPLOY_PATH" -mindepth 1 -maxdepth 1 \
            ! -name '.env' \
            ! -name '.deploy-images.env' \
            -exec rm -rf {} +
          REMOTE

          remote_extract_cmd="$(printf 'tar -xzf - -C %q' "$DEPLOY_PATH")"
          tar -C "$bundle_dir" -czf - . | ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "$remote_extract_cmd"

      - name: Sync environment file
        shell: bash
        env:
          DEPLOY_ENV_FILE: ${{ secrets['DEPLOY_ENV_FILE'] }}
        run: |
          set -euo pipefail
          if [ -z "$DEPLOY_ENV_FILE" ]; then
            echo "DEPLOY_ENV_FILE is not set; using existing remote .env"
            exit 0
          fi

          tmp_env="$(mktemp)"
          trap 'rm -f "$tmp_env"' EXIT
          printf '%s\n' "$DEPLOY_ENV_FILE" > "$tmp_env"

          remote_env="/tmp/go-shoppings-env-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          scp -i ~/.ssh/deploy_key -P "$DEPLOY_PORT" "$tmp_env" "$DEPLOY_USER@$DEPLOY_HOST:$remote_env"
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH=$(printf '%q' "$DEPLOY_PATH") REMOTE_ENV=$(printf '%q' "$remote_env") bash -s" <<'REMOTE'
          set -euo pipefail
          mkdir -p "$DEPLOY_PATH"
          umask 077
          cat "$REMOTE_ENV" > "$DEPLOY_PATH/.env"
          rm -f "$REMOTE_ENV"
          REMOTE

      - name: Login to Huawei SWR on server
        shell: bash
        env:
          HUAWEI_SWR_REGISTRY: ${{ secrets['HUAWEI_SWR_REGISTRY'] }}
          HUAWEI_SWR_USERNAME: ${{ secrets['HUAWEI_SWR_USERNAME'] }}
          HUAWEI_SWR_PASSWORD: ${{ secrets['HUAWEI_SWR_PASSWORD'] }}
        run: |
          set -euo pipefail
          : "${HUAWEI_SWR_REGISTRY:?Set GitHub secret HUAWEI_SWR_REGISTRY}"
          : "${HUAWEI_SWR_USERNAME:?Set GitHub secret HUAWEI_SWR_USERNAME}"
          : "${HUAWEI_SWR_PASSWORD:?Set GitHub secret HUAWEI_SWR_PASSWORD}"

          remote_login_cmd="$(printf 'docker login %q -u %q --password-stdin' "$HUAWEI_SWR_REGISTRY" "$HUAWEI_SWR_USERNAME")"
          printf '%s\n' "$HUAWEI_SWR_PASSWORD" | ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "$remote_login_cmd"

      - name: Deploy services
        shell: bash
        run: |
          set -euo pipefail
          : "${API_IMAGE:?Missing API image from publish job}"
          : "${AI_IMAGE:?Missing AI image from publish job}"
          : "${GATEWAY_IMAGE:?Missing gateway image metadata}"
          : "${REDIS_IMAGE:?Missing redis image metadata}"

          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH=$(printf '%q' "$DEPLOY_PATH") API_IMAGE=$(printf '%q' "$API_IMAGE") AI_IMAGE=$(printf '%q' "$AI_IMAGE") GATEWAY_IMAGE=$(printf '%q' "$GATEWAY_IMAGE") REDIS_IMAGE=$(printf '%q' "$REDIS_IMAGE") bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$DEPLOY_PATH"

          if [ ! -f .env ]; then
            echo "Missing $DEPLOY_PATH/.env. Set DEPLOY_ENV_FILE or create the file on the server." >&2
            exit 1
          fi

          docker compose -f docker-compose.infra.yml up -d redis
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.infra.yml exec -T redis redis-cli ping >/dev/null 2>&1; then
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Redis did not become ready" >&2
              docker compose -f docker-compose.infra.yml logs redis >&2
              exit 1
            fi
            sleep 1
          done

          cat > .deploy-images.env <<IMAGES
          API_IMAGE=$API_IMAGE
          AI_IMAGE=$AI_IMAGE
          GATEWAY_IMAGE=$GATEWAY_IMAGE
          REDIS_IMAGE=$REDIS_IMAGE
          IMAGES

          export API_IMAGE AI_IMAGE GATEWAY_IMAGE REDIS_IMAGE
          docker compose -f docker-compose.deploy.yml pull gateway api ai-image
          docker compose -f docker-compose.deploy.yml up -d --no-build gateway api ai-image
          docker compose -f docker-compose.infra.yml -f docker-compose.deploy.yml ps

          api_port="$(grep -E '^API_HOST_PORT=' .env | tail -n 1 | cut -d '=' -f 2- | tr -d '"' || true)"
          api_port="${api_port:-18080}"
          curl --retry 12 --retry-delay 5 --retry-connrefused -fsS "http://127.0.0.1:${api_port}/healthz" >/dev/null
          curl --retry 12 --retry-delay 5 --retry-connrefused -fsS "http://127.0.0.1:${api_port}/ai-image/healthz" >/dev/null
          REMOTE
