# SaaS 微信商城 - 应用配置

app:
  name: "wechat-mall-saas"
  env: "development"
  host: "0.0.0.0"
  port: 8080
  mode: "debug"

database:
  driver: "postgres"
  dsn: "${SUPABASE_DB_DSN}"    # 推荐使用 Supabase 连接串：postgresql://...?...sslmode=require
  host: ""                     # 不使用 dsn 时，可改用 host/port/user/password/name
  port: 5432
  user: ""
  password: ""
  name: "postgres"
  sslmode: "require"
  prefer_simple_protocol: true # Supabase pooler / PgBouncer 场景建议开启
  max_open_conns: 20
  max_idle_conns: 20
  conn_max_lifetime: 3600

redis:
  host: "127.0.0.1"
  port: 6379
  password: ""
  db: 0
  pool_size: 100
  min_idle_conns: 10

jwt:
  secret: "change-this-secret-in-production"
  expire_hours: 168           # 7 天
  refresh_expire_hours: 720   # 30 天

wechat:
  app_id: ""                 # 服务商 AppID（服务商模式必填）
  app_secret: ""            # 服务商 AppSecret
  token: ""                 # 微信服务器验证 Token
  encoding_aes_key: ""       # 消息加密 AES Key

# 平台统一微信支付商户（SaaS 订阅付费走此商户号；租户的商品订单仍走各自租户 mch）
wxpay:
  app_id: ""                 # 平台 AppID
  mch_id: ""                 # 平台商户号
  apiv3_key: ""              # APIv3 密钥
  cert_serial: ""            # 证书序列号
  notify_url: "http://localhost:8080/api/v1/public/subscription/callback"

storage:
  type: "supabase"           # local / minio / supabase
  local:
    path: "./uploads"
    base_url: "http://localhost:8080/uploads"
  minio:
    endpoint: "127.0.0.1:9000"
    access_key: "minioadmin"
    secret_key: "minioadmin"
    bucket: "wxmall"
    use_ssl: false
    region: "us-east-1"
    base_url: ""             # 留空则走 endpoint；填写 CDN/反代域名则返回该前缀
    public_read: true        # true=bucket 公开读，返回直链；false=返回 7 天预签名 URL
  supabase:
    project_url: "${SUPABASE_URL}"
    service_role_key: "${SUPABASE_SERVICE_ROLE_KEY}"
    bucket: "${SUPABASE_STORAGE_BUCKET}"
    public_read: true        # 商品/分类图片建议使用公开 bucket，便于小程序直接展示
    base_url: ""             # 可填 CDN 或自定义域名；留空使用 Supabase public object URL
    signed_url_expires: 604800
    create_bucket: true      # bucket 不存在时用 service_role 自动创建
    upsert: true

logging:
  level: "debug"             # debug / info / warn / error
  filename: "logs/app.log"
  max_size: 100             # MB
  max_backups: 10
  max_age: 7                # 天

rate_limit:
  enabled: true
  qps: 1000
  burst: 2000
