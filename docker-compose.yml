version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: wechat-mall-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: wechat_mall_saas
      TZ: Asia/Shanghai
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./scripts/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    command:
      - "postgres"
      - "-c"
      - "max_connections=1000"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "timezone=Asia/Shanghai"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wechat_mall_saas"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: wechat-mall-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wechat-mall-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ENV: development
      DB_HOST: host.docker.internal
      DB_PORT: 5433
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_NAME: wechat_mall_saas
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your-jwt-secret-key-change-in-production
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./configs:/app/configs:ro
      - uploads:/app/uploads

volumes:
  postgres_data:
  redis_data:
  uploads:
