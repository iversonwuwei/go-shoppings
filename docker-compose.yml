version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: wechat-mall-postgres
    profiles:
      - local
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: wechat_mall_saas
      TZ: Asia/Shanghai
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./scripts/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    command:
      - "postgres"
      - "-c"
      - "max_connections=1000"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "timezone=Asia/Shanghai"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wechat_mall_saas"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: wechat-mall-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wechat-mall-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_ENV: development
      DATABASE_URL: ${SUPABASE_DB_DSN:-}
      DATABASE_PREFER_SIMPLE_PROTOCOL: ${DATABASE_PREFER_SIMPLE_PROTOCOL:-true}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-key-change-in-production}
      STORAGE_TYPE: supabase
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-wxmall}
      SUPABASE_STORAGE_PUBLIC_READ: ${SUPABASE_STORAGE_PUBLIC_READ:-true}
      SUPABASE_STORAGE_CREATE_BUCKET: ${SUPABASE_STORAGE_CREATE_BUCKET:-true}
      SUPABASE_STORAGE_UPSERT: ${SUPABASE_STORAGE_UPSERT:-true}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./configs:/app/configs:ro
      - uploads:/app/uploads

  minio:
    image: minio/minio
    container_name: wechat-mall-minio
    profiles:
      - local
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  uploads:
  minio_data:
