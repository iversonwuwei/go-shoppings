root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/api.exe ./cmd/api"
  bin = "./tmp/api.exe"
  include_ext = ["go", "yaml"]
  exclude_dir = ["tmp", "bin", "logs", "uploads", "test"]
  delay = 1000
  stop_on_error = true

[log]
  time = true

[color]
  main = "magenta"
  build = "yellow"
  runner = "green"
